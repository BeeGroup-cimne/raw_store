name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # --- Infraestructura (igual per tots els environments) ---
  ECR_REGISTRY: 853583158095.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY: ecr-library-hbase-raw-ingestor
  AWS_REGION: eu-west-1
  # --- Específic d'aquest environment (canviar al copiar per staging/dev) ---
  ENV_TAG: prod
  KUBE_DIR: kubeconfig/prod
  KUBE_NAMESPACE: icat-prod-ingestors
  EKS_CLUSTER_NAME: eks-pro-beegroup

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
      - name: Get commit SHAs
        id: vars
        run: |
          PROJECT_SHA=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${PROJECT_SHA}" >> $GITHUB_OUTPUT
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.ENV_TAG }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:cache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:cache,mode=max
      - name: Configure kubeconfig (EKS)
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
        # Prerequisits IAM:
        #   - Permís eks:DescribeCluster al policy de l'IAM user/role
        #   - L'IAM ARN afegit al EKS access management (aws-auth ConfigMap o Access Entries)
        #   - RBAC: permís per apply CronJobs/Deployments al namespace $KUBE_NAMESPACE

      - name: Apply Kubernetes manifests
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.IMAGE_TAG }}
        run: |
          FAILED=0
          for yaml in $KUBE_DIR/*.yaml $KUBE_DIR/*.yml; do
            [ -f "$yaml" ] || continue
            echo "→ Applying $yaml (tag: $IMAGE_TAG)"
            if ! sed "s|$ECR_REGISTRY/$ECR_REPOSITORY:$ENV_TAG|$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG|g" "$yaml" \
              | kubectl apply -f -; then
              echo "✗ Error applying $yaml"
              FAILED=1
              continue
            fi
            kind=$(grep '^kind:' "$yaml" | awk '{print $2}')
            if [ "$kind" = "Deployment" ]; then
              name=$(grep '^  name:' "$yaml" | head -1 | awk '{print $2}')
              ns=$(grep '^  namespace:' "$yaml" | head -1 | awk '{print $2}')
              echo "→ Waiting for rollout: deployment/$name -n $ns"
              kubectl rollout status deployment/"$name" -n "$ns" --timeout=5m
            fi
          done
          exit $FAILED

      - name: Verify deployment
        run: |
          echo "Deployed image: $ECR_REGISTRY/$ECR_REPOSITORY:${{ steps.vars.outputs.IMAGE_TAG }}"
          kubectl get cronjobs,deployments -n $KUBE_NAMESPACE
