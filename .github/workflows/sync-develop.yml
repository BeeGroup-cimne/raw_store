name: Sync develop to main

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BASE_REPO_TOKEN }}

      - name: Fast-forward develop to main
        run: git push origin HEAD:develop